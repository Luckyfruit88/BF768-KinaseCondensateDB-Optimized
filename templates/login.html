<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CondensateDB Login</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="auth-body">
<div class="auth-left">
  <div class="badge-tag">Scientific Database Project</div>
  <h1>KinaseCondensateDB</h1>
  <p class="hero-desc">Explore kinase–condensate interactions, disease evidence, and chemical modifiers in one integrated relational database.</p>
  <div class="hero-stats">
    <div class="hs-item"><strong>632</strong><span>Reviewed Kinases</span></div>
    <div class="hs-item"><strong>32k+</strong><span>Condensates</span></div>
    <div class="hs-item"><strong>9</strong><span>Relational Tables</span></div>
  </div>
</div>
<div class="auth-card">
  <h2>Sign In to Portal</h2>
  <div class="form-row"><label>Username</label><input id="username" class="input" placeholder="e.g. xiaoming"></div>
  <div class="form-row"><label>Password</label><input id="password" type="password" class="input" placeholder="e.g. 123456"></div>
  <label>Role</label>
  <div class="radio">
    <label><input type="radio" name="role" value="User" checked> User</label>
    <label><input type="radio" name="role" value="Administrator"> Administrator</label>
  </div>
  <button class="btn primary full-width" onclick="login()">Access Database</button> 
  <div class="auth-links">
    <a href="#" onclick="location.href='/register'">Create account</a>
  </div>
</div>
<script>
async function login(){const username=document.getElementById('username').value.trim(),password=document.getElementById('password').value.trim(),roleLabel=document.querySelector("input[name=role]:checked")?.value,role=roleLabel==="Administrator"?"管理员":"普通用户";if(!username||!password||!role){alert('Username, password and role are required');return}const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password,role})});const j=await r.json();if(j.code!==200){alert(j.msg);return}localStorage.setItem('token',j.data.token);localStorage.setItem('user',JSON.stringify(j.data.user));location.href=roleLabel==='Administrator'?'/admin':'/index'}
</script>
</body>
</html>
